chatop:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-me-please-dev-secret-key}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
  uploads:
    rentals-dir: ${RENTAL_UPLOADS_DIR:uploads/rentals}
    rentals-url-path: /api/uploads/rentals/
    allowed-picture-extensions:
      - jpg
      - jpeg
      - png
      - webp
  mail:
    from: ${MAIL_FROM:no-reply@chatop.local}
    rental-message:
      subject-template: "New message for your rental: %s"
      body-template: |
        Hello,

        %s (%s) sent you a message about your rental "%s":

        %s
      delivery-failure-log: Unable to send rental message email notification
  open-api:
    title: Châtop API
    description: Backend REST API for the Châtop project.
    version: v1
  system:
    name: Châtop API
    status: running
    health-path: /api/health
    health-status: OK
  responses:
    rental-created: Rental created !
    rental-updated: Rental updated !
    message-sent: Message send with success
  errors:
    email-already-exists: Email already exists
    invalid-credentials: Invalid credentials
    unauthorized: Unauthorized
    user-not-found: User not found
    rental-not-found: Rental not found
    forbidden: Forbidden
    invalid-user-id: Invalid user_id
    invalid-rental-id: Invalid rental_id
    picture-file-required: Picture must be sent as a file
    invalid-picture-filename: Invalid picture filename
    could-not-store-picture: Could not store picture
    could-not-delete-picture: Could not delete picture
    picture-required: Picture is required
    picture-extension-required: Picture extension is required
    picture-format-not-supported: Picture format is not supported
    picture-must-be-image: Picture must be an image
