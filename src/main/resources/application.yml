spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: api
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:chatop_db}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    open-in-view: false
  web:
    error:
      include-stacktrace: never
      include-message: never
      include-binding-errors: never
      include-exception: false
      whitelabel:
        enabled: false
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USER:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:false}

server:
  port: 9001

app:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-change-me-please-dev-secret-key}
    expiration-seconds: ${JWT_EXPIRATION_SECONDS:86400}
  uploads:
    rentals-dir: ${RENTAL_UPLOADS_DIR:uploads/rentals}
  mail:
    from: ${MAIL_FROM:no-reply@chatop.local}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
