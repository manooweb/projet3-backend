<!DOCTYPE html>
<html lang="fr" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChâTop API</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Arial, Helvetica, sans-serif;
            color: #1f2937;
            background: #f8fafc;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
        }

        main {
            width: min(100% - 32px, 720px);
            padding: 48px;
            border: 1px solid #d9e2ec;
            border-radius: 8px;
            background: #ffffff;
        }

        h1 {
            margin: 0 0 16px;
            font-size: 2.5rem;
            line-height: 1.1;
        }

        p {
            margin: 0 0 24px;
            color: #4b5563;
            line-height: 1.6;
        }

        a {
            display: inline-flex;
            align-items: center;
            min-height: 44px;
            padding: 0 18px;
            border-radius: 6px;
            color: #ffffff;
            background: #0f766e;
            font-weight: 700;
            text-decoration: none;
        }

        a:focus-visible,
        a:hover {
            background: #115e59;
        }
    </style>
</head>
<body>
    <main>
        <h1>ChâTop API</h1>
        <p>Interface d'accueil du backend ChâTop.</p>
        <a th:href="@{/swagger-ui.html}" href="/swagger-ui.html">Ouvrir Swagger UI</a>
    </main>
</body>
</html>
