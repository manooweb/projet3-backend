<!DOCTYPE html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChâTop API</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Arial, Helvetica, sans-serif;
            color: #1f2937;
            background: #f8fafc;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            justify-items: center;
            align-items: start;
            padding: 48px 0;
        }

        main {
            width: min(100% - 32px, 720px);
            padding: 48px;
            border: 1px solid #d9e2ec;
            border-radius: 8px;
            background: #ffffff;
        }

        h1 {
            margin: 0 0 16px;
            font-size: 2.5rem;
            line-height: 1.1;
        }

        p {
            margin: 0 0 24px;
            color: #4b5563;
            line-height: 1.6;
        }

        .status-block {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin: 0 0 24px;
            padding: 12px 16px;
            border: 1px solid #bfdbfe;
            border-radius: 8px;
            color: #1d4ed8;
            background: #eff6ff;
            font-weight: 700;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #3b82f6;
        }

        .status-block--healthy {
            border-color: #bbf7d0;
            color: #166534;
            background: #f0fdf4;
        }

        .status-block--healthy .status-dot {
            background: #16a34a;
        }

        .status-block--degraded {
            border-color: #fed7aa;
            color: #9a3412;
            background: #fff7ed;
        }

        .status-block--degraded .status-dot {
            background: #f97316;
        }

        .status-block--unavailable {
            border-color: #fecaca;
            color: #991b1b;
            background: #fef2f2;
        }

        .status-block--unavailable .status-dot {
            background: #dc2626;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        a,
        button {
            display: inline-flex;
            align-items: center;
            min-height: 44px;
            padding: 0 18px;
            border: 0;
            border-radius: 6px;
            color: #ffffff;
            background: #0f766e;
            font: inherit;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        button {
            background: #1f2937;
        }

        a.secondary-link {
            color: #1f2937;
            background: #ffffff;
            border: 1px solid #d9e2ec;
        }

        a:focus-visible,
        a:hover,
        button:focus-visible,
        button:hover {
            background: #115e59;
        }

        button:disabled {
            cursor: wait;
            opacity: 0.7;
        }

        .hidden {
            display: none;
        }

        a.secondary-link:focus-visible,
        a.secondary-link:hover {
            background: #f8fafc;
        }
    </style>
</head>
<body>
    <main>
        <h1>ChâTop API</h1>
        <p>ChâTop backend home page.</p>
        <div class="status-block" id="api-status" aria-live="polite">
            <span class="status-dot" aria-hidden="true"></span>
            <span>
                API status:
                <strong id="api-status-text">Checking...</strong>
            </span>
        </div>
        <div class="actions">
            <a th:href="@{/swagger-ui.html}" href="/swagger-ui.html">Open Swagger UI</a>
            <button type="button" id="refresh-status" data-check-button>Check database status</button>
            <button type="button" id="check-schema" class="hidden" data-check-button>Check database schema</button>
            <a
                class="secondary-link"
                th:href="@{/api/health}"
                href="/api/health"
                target="_blank"
                rel="noopener noreferrer"
            >View /api/health</a>
        </div>
    </main>
    <script th:src="@{/js/home-status.js}" src="/js/home-status.js"></script>
</body>
</html>
